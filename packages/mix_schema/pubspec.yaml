name: mix_schema
description: Schema-first contract for validating, decoding, and exporting Mix UI payloads.
publish_to: none
version: 0.1.0-dev.0
repository: https://github.com/btwld/mix/tree/main/packages/mix_schema

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  mix:
    path: ../mix
  ack:
    git:
      url: https://github.com/btwld/ack.git
      ref: 31fcd177acd5b92975505579c27d83916134c161
      path: packages/ack
  ack_annotations:
    git:
      url: https://github.com/btwld/ack.git
      ref: 31fcd177acd5b92975505579c27d83916134c161
      path: packages/ack_annotations

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  dart_code_metrics_presets: ^2.24.0
  ack_generator:
    git:
      url: https://github.com/btwld/ack.git
      ref: 31fcd177acd5b92975505579c27d83916134c161
      path: packages/ack_generator
  build_runner: ^2.11.0

dependency_overrides:
  ack:
    git:
      url: https://github.com/btwld/ack.git
      ref: 31fcd177acd5b92975505579c27d83916134c161
      path: packages/ack
  ack_annotations:
    git:
      url: https://github.com/btwld/ack.git
      ref: 31fcd177acd5b92975505579c27d83916134c161
      path: packages/ack_annotations
  ack_generator:
    git:
      url: https://github.com/btwld/ack.git
      ref: 31fcd177acd5b92975505579c27d83916134c161
      path: packages/ack_generator
