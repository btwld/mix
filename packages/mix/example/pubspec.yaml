name: mix_example
description: "Demo app showcasing Mix shadow styling: BoxShadowListMix, ShadowListMix, and shadow tokens through .mix()."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  mix:
    path: ..

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Resolve the in-repo packages by path so the example builds standalone,
# without requiring `melos bootstrap`. Melos also manages these via the
# (git-ignored) pubspec_overrides.yaml, which takes precedence when present.
dependency_overrides:
  mix:
    path: ..
  mix_annotations:
    path: ../../mix_annotations

flutter:
  uses-material-design: true
