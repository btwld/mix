name: mix_tailwinds_example
description: "Demo app showing mix_tailwinds output next to real Tailwind CSS references."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  mix_tailwinds:
    path: ..

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - "assets/images/flowbite-card-hero.png"
  fonts:
    - family: TwParityRoboto
      fonts:
        - asset: "assets/fonts/roboto/Roboto[wdth,wght].ttf"
          weight: 400
        - asset: "assets/fonts/roboto/Roboto[wdth,wght].ttf"
          weight: 500
        - asset: "assets/fonts/roboto/Roboto[wdth,wght].ttf"
          weight: 600
        - asset: "assets/fonts/roboto/Roboto[wdth,wght].ttf"
          weight: 700
