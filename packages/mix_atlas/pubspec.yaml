name: mix_atlas
description: >-
  Static component atlases for Mix-based design systems. Renders every
  variant x state combination of a component for visual review, golden
  snapshots, and AI-agent validation.
version: 0.1.0
homepage: https://github.com/btwld/mix
repository: https://github.com/btwld/mix/tree/main/packages/mix_atlas

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  # Regular (not dev) dependency: lib/golden.dart is a public entrypoint
  # (package:mix_atlas/golden.dart) that imports flutter_test for the golden
  # harness, so consumers pull it in transitively.
  flutter_test:
    sdk: flutter
  mix: ^2.0.3

dev_dependencies:
  flutter_lints: ^6.0.0
  dart_code_metrics_presets: ^2.24.0

flutter:
  uses-material-design: true
