targets:
  $default:
    builders:
      mix_generator:mix_generator:
        enabled: true
        generate_for:
          - lib/src/specs/**/*.dart  # Narrowed scope for specs only.
      mix_generator:styler_generator:
        enabled: true
        generate_for:
          - lib/src/specs/**/*.dart  # Narrowed scope for specs only.
      mix_generator:spec_styler_generator:
        enabled: true
        generate_for:
          - lib/src/specs/**/*.dart  # Spec-driven styler spike.
      mix_generator:mixable_generator:
        enabled: true
        generate_for:
          - lib/src/properties/**/*.dart  # Mix property classes.
      mix_generator:mix_widget_generator:
        enabled: true
        generate_for:
          - lib/**/*.dart            # Broader because users annotate anywhere.

builders:
  mix_generator:
    import: 'package:mix_generator/mix_generator.dart'
    builder_factories: ['mixGenerator']
    build_extensions: {'.dart': ['.mix_generator.g.part']}
    auto_apply: dependents
    build_to: cache
    applies_builders: ['source_gen:combining_builder']

  styler_generator:
    import: 'package:mix_generator/mix_generator.dart'
    builder_factories: ['stylerGenerator']
    build_extensions: {'.dart': ['.styler_generator.g.part']}
    auto_apply: dependents
    build_to: cache
    applies_builders: ['source_gen:combining_builder']

  # Opt-in only during the spec-driven styler spike. Consumers must
  # explicitly enable this builder in their own build.yaml (see
  # packages/mix/build.yaml for the fixture-scoped enablement).
  spec_styler_generator:
    import: 'package:mix_generator/mix_generator.dart'
    builder_factories: ['specStylerGenerator']
    build_extensions: {'.dart': ['.spec_styler_generator.g.part']}
    auto_apply: none
    build_to: cache
    applies_builders: ['source_gen:combining_builder']

  mixable_generator:
    import: 'package:mix_generator/mix_generator.dart'
    builder_factories: ['mixableGenerator']
    build_extensions: {'.dart': ['.mixable_generator.g.part']}
    auto_apply: dependents
    build_to: cache
    applies_builders: ['source_gen:combining_builder']

  mix_widget_generator:
    import: 'package:mix_generator/mix_generator.dart'
    builder_factories: ['mixWidgetGenerator']
    build_extensions: {'.dart': ['.mix_widget_generator.g.part']}
    auto_apply: dependents
    build_to: cache
    applies_builders: ['source_gen:combining_builder']
