name: mix_chart
description: Type-safe Flutter chart widgets styled with Mix.
version: 0.0.1
homepage: https://github.com/btwld/mix
repository: https://github.com/btwld/mix/tree/main/packages/mix_chart

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^1.2.0
  mix: ^2.2.0-beta.0
  mix_annotations: ^2.2.0-beta.0

dev_dependencies:
  build_runner: ^2.11.0
  dart_code_metrics_presets: ^2.24.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mix_generator:
    version: ^2.2.0-beta.0
    path: ../mix_generator

screenshots:
  - description: A light line-chart gallery built with mix_chart.
    path: example/screenshots/line-gallery-light.png
  - description: A dark pie and donut chart gallery built with mix_chart.
    path: example/screenshots/pie-gallery-dark.png
  - description: A dark analytics dashboard composed with mix_chart.
    path: example/screenshots/dashboard-dark.png
