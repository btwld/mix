name: Publish to pub.dev

on:
  push:
    tags:
      - 'mix-v[0-9]+.[0-9]+.[0-9]+*'
      - 'mix_annotations-v[0-9]+.[0-9]+.[0-9]+*'
      - 'mix_generator-v[0-9]+.[0-9]+.[0-9]+*'
      - 'mix_lint-v[0-9]+.[0-9]+.[0-9]+*'
      - 'mix_tailwinds-v[0-9]+.[0-9]+.[0-9]+*'
      - 'mix_chart-v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish_mix:
    if: startsWith(github.ref_name, 'mix-v')
    uses: btwld/dart-actions/.github/workflows/publish.yml@main
    with:
      packages_folder_path: "packages"
      packages: |
        mix
    permissions:
      id-token: write
      contents: read

  publish_mix_annotations:
    if: startsWith(github.ref_name, 'mix_annotations-v')
    uses: btwld/dart-actions/.github/workflows/publish.yml@main
    with:
      packages_folder_path: "packages"
      packages: |
        mix_annotations
    permissions:
      id-token: write
      contents: read

  publish_mix_generator:
    if: startsWith(github.ref_name, 'mix_generator-v')
    uses: btwld/dart-actions/.github/workflows/publish.yml@main
    with:
      packages_folder_path: "packages"
      packages: |
        mix_generator
    permissions:
      id-token: write
      contents: read

  publish_mix_lint:
    if: startsWith(github.ref_name, 'mix_lint-v')
    uses: btwld/dart-actions/.github/workflows/publish.yml@main
    with:
      packages_folder_path: "packages"
      packages: |
        mix_lint
    permissions:
      id-token: write
      contents: read

  publish_mix_tailwinds:
    if: startsWith(github.ref_name, 'mix_tailwinds-v')
    uses: btwld/dart-actions/.github/workflows/publish.yml@main
    with:
      packages_folder_path: "packages"
      packages: |
        mix_tailwinds
    permissions:
      id-token: write
      contents: read

  publish_mix_chart:
    if: startsWith(github.ref_name, 'mix_chart-v')
    name: Publish mix_chart to pub.dev
    environment: Production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart (provision OIDC)
        uses: dart-lang/setup-dart@v1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install mix_chart dependencies
        working-directory: packages/mix_chart
        run: flutter pub get

      - name: Test mix_chart
        working-directory: packages/mix_chart
        run: flutter test

      # 0.0.1 intentionally targets the coordinated Mix 2.2 beta. Pub treats
      # stable packages with prerelease dependencies as a warning, not an error.
      - name: Validate mix_chart package
        working-directory: packages/mix_chart
        run: dart pub publish --dry-run --ignore-warnings

      - name: Publish mix_chart to pub.dev (OIDC)
        working-directory: packages/mix_chart
        run: dart pub publish --force
