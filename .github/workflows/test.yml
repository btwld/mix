name: Test Workflow

on:
  push:
    branches: [main, next]
    paths-ignore:
      - 'assets/**'
      - 'tool/**'

  pull_request:
    branches: [main, next]
    paths-ignore:
      - 'test_resources/**'
      - 'assets/**'
      - 'tool/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
      - name: Setup Melos
        run: |
          dart pub global activate melos 6.3.3
          melos bootstrap
      - name: Check formatting
        run: melos run format:check

  test:
    name: Test
    uses: btwld/dart-actions/.github/workflows/ci.yml@9075ce1232ec77b8747953f2ff4a349190e5a805
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      flutter-version: 'stable'
      run-dcm: true
      melos-commands: |
        melos run analyze

  mix_atlas_preview:
    name: Mix Atlas preview (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
      - name: Bootstrap workspace
        run: |
          dart pub global activate melos 6.3.3
          melos bootstrap
      - name: Compare mix_atlas goldens
        run: |
          cd packages/mix_atlas
          flutter test --reporter failures-only
      - name: Test standalone Mix Atlas app and screen goldens
        run: |
          cd apps/mix_atlas
          flutter test --reporter failures-only
      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mix-atlas-golden-failures
          path: |
            packages/mix_atlas/test/failures/**
            apps/mix_atlas/test/failures/**
          if-no-files-found: ignore
      - name: Regenerate canonical goldens after failure
        if: failure()
        run: |
          cd packages/mix_atlas
          flutter test --update-goldens --reporter failures-only
          cd ../../apps/mix_atlas
          flutter test test/golden_test.dart --update-goldens --reporter failures-only
      - name: Upload canonical goldens
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mix-atlas-canonical-goldens
          path: |
            packages/mix_atlas/test/goldens/**
            packages/mix_atlas/test/viewer_goldens/**
            apps/mix_atlas/test/goldens/**
      - name: Build mix_atlas macOS example
        run: |
          cd packages/mix_atlas/example
          flutter create --platforms=macos .
          flutter build macos --debug
      - name: Build unsigned standalone developer preview
        run: |
          cd apps/mix_atlas
          flutter build macos --release --no-tree-shake-icons
      - name: Upload standalone developer preview
        uses: actions/upload-artifact@v4
        with:
          name: mix-atlas-macos-developer-preview
          path: apps/mix_atlas/build/macos/Build/Products/Release/mix_atlas.app
          if-no-files-found: error
