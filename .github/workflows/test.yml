name: Test Workflow

on:
  push:
    branches: [main, next]
    paths-ignore:
      - 'assets/**'
      - 'tool/**'

  pull_request:
    branches: [main, next]
    paths-ignore:
      - 'test_resources/**'
      - 'assets/**'
      - 'tool/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
      - name: Setup Melos
        run: |
          dart pub global activate melos 6.3.3
          melos bootstrap
      - name: Check formatting
        run: melos run format:check

  test:
    name: Test
    uses: btwld/dart-actions/.github/workflows/ci.yml@9075ce1232ec77b8747953f2ff4a349190e5a805
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      flutter-version: 'stable'
      # DCM requires CI credentials; the reusable workflow still runs Dart analysis.
      run-dcm: false
      melos-commands: |
        melos run schema:inventory
        melos run schema:export
        melos run analyze:dart

  figma-plugin:
    name: Figma Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            plugin:
              - 'packages/mix_figma_plugin/**'
              - 'packages/mix_protocol/schema/**'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.plugin == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/mix_figma_plugin/package-lock.json
      - name: Install dependencies
        if: steps.changes.outputs.plugin == 'true'
        working-directory: packages/mix_figma_plugin
        run: npm ci
      - name: Verify generated types
        if: steps.changes.outputs.plugin == 'true'
        working-directory: packages/mix_figma_plugin
        run: |
          npm run gen:types
          git diff --exit-code -- src/generated
      - name: Build and test
        if: steps.changes.outputs.plugin == 'true'
        working-directory: packages/mix_figma_plugin
        run: npm run build && npm test
