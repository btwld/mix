name: examples
description: "Example project for the mix package."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"
resolution: workspace

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  mix:
    path: ../packages/mix
  mix_tailwinds:
    path: ../packages/mix_tailwinds


dev_dependencies:
  flutter_test:
    sdk: flutter
  dart_code_metrics_presets: ^2.24.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
