name: mix_atlas_app
description: Standalone macOS viewer for validated Mix Atlas captures.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  file_selector: ^1.0.3
  flutter:
    sdk: flutter
  mix_atlas_capture:
    path: ../../packages/mix_atlas_capture

dev_dependencies:
  dart_code_metrics_presets: ^2.24.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mix_atlas:
    path: ../../packages/mix_atlas

flutter:
  uses-material-design: true
